name: CD Frontend

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'

jobs:
  deploy-staging:
    name: Deploy to Staging (AWS EC2 - Tomcat ROOT)
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build Frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/staging_key.pem
          chmod 600 ~/.ssh/staging_key.pem
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Clean and Copy Static Files to Tomcat ROOT Staging
        run: |
          # Limpia el contenido previo del ROOT de Tomcat para evitar basura de compilaciones viejas
          ssh -i ~/.ssh/staging_key.pem ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "sudo rm -rf /opt/tomcat/webapps/ROOT/*"
          # Sube los archivos estáticos limpios de la carpeta dist de Vite
          scp -r -i ~/.ssh/staging_key.pem dist/* ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/tomcat/webapps/ROOT/

  deploy-production:
    name: Deploy to Production (AWS EC2 - Tomcat ROOT)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build Frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key.pem
          chmod 600 ~/.ssh/prod_key.pem
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Clean and Copy Static Files to Tomcat ROOT Production
        run: |
          # Limpia el ROOT de producción de Tomcat
          ssh -i ~/.ssh/prod_key.pem ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "sudo rm -rf /opt/tomcat/webapps/ROOT/*"
          # Sube la compilación final de producción
          scp -r -i ~/.ssh/prod_key.pem dist/* ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/tomcat/webapps/ROOT/

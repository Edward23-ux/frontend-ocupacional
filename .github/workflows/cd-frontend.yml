name: CD Frontend

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'

jobs:
  deploy-staging:
    name: Deploy to Staging (AWS EC2 Nginx)
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build Frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/staging_key.pem
          chmod 600 ~/.ssh/staging_key.pem
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Static Files to EC2 Staging
        run: |
          # Limpia/crea carpeta temporal para evitar colisiones y copia los archivos
          ssh -i ~/.ssh/staging_key.pem ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "mkdir -p /home/${{ secrets.STAGING_USER }}/frontend-staging"
          scp -r -i ~/.ssh/staging_key.pem dist/* ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/home/${{ secrets.STAGING_USER }}/frontend-staging/

      - name: Update Nginx and Restart on Staging
        run: |
          ssh -i ~/.ssh/staging_key.pem ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            sudo cp -r /home/${{ secrets.STAGING_USER }}/frontend-staging/* /var/www/html/
            sudo systemctl restart nginx
          EOF

  deploy-production:
    name: Deploy to Production (AWS EC2 Nginx)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build Frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key.pem
          chmod 600 ~/.ssh/prod_key.pem
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Static Files to EC2 Production
        run: |
          ssh -i ~/.ssh/prod_key.pem ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "mkdir -p /home/${{ secrets.PROD_USER }}/frontend-prod"
          scp -r -i ~/.ssh/prod_key.pem dist/* ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/home/${{ secrets.PROD_USER }}/frontend-prod/

      - name: Update Nginx and Restart on Production
        run: |
          ssh -i ~/.ssh/prod_key.pem ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            sudo cp -r /home/${{ secrets.PROD_USER }}/frontend-prod/* /var/www/html/
            sudo systemctl restart nginx
          EOF

name: Deploy Frontend (Vite) to AWS

on:
  push:
    branches:
      - main  # Se ejecuta automáticamente cuando subes cambios a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    # 1. Compila el proyecto de Vite (genera la carpeta dist/)
    - name: Build Project
      run: npm run build

    # 2. Copia los archivos estáticos a la carpeta del servidor Web
    - name: Copy Frontend Files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "dist/*"
        target: "/var/www/html/" # Carpeta web del servidor por defecto en Ubuntu
        strip_components: 1      # Sube los archivos directo sin meterlos en una carpeta "dist"